[paths]
boundary_shapefile = "data/boundaries/community_districts_20260306/geo_export_e1c55842-b6cf-48de-89dd-fb84825c0f0d.shp"
ortho_base_dir = "data"
output_base_dir = "output/cd"

[paths.patterns]
# {boro_name}, {year}, and {year_short} are substituted at runtime
ortho_dir = "nyc_ortho_{year}"
boro_dir = "boro_{boro_name}_sp{year_short}"
image_extension = ".jp2"

# Mosaic shapefile naming varies by imagery vintage.
# "default" applies to all years unless a year-specific override exists.
[paths.patterns.mosaic_shapefile]
default = "nyc_sp_4bd_06in_index{year_short}.shp"
2024 = "{year_short}_b_{boro_name}_l06_4bd.shp"

[spatial]
target_crs = 2263  # EPSG:2263 - NY State Plane Long Island (ft)

[fields]
boundary_cd_field = "boro_cd"
mosaic_image_field = "Image"

[boroughs]
# leading digit of boro_cd -> directory name component
[boroughs.mapping]
1 = "manhattan"
2 = "bronx"
3 = "brooklyn"
4 = "queens"
5 = "staten_island"